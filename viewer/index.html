<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Open Vehicle Passport</title>
<style>
  /* color-scheme alone isn't enough -- some in-app browsers (e.g. opening
     a shared link from Messenger) don't reliably apply the UA's own
     dark-mode default colors even when this is set, leaving body text
     effectively unreadable against a dark wrapper. Explicit background/
     color for both modes closes that gap regardless of what the
     embedding browser does with color-scheme on its own. */
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, system-ui, sans-serif; max-width: 640px;
         margin: 2rem auto; padding: 0 1rem; line-height: 1.5;
         background: #fff; color: #1a1a1a; }
  @media (prefers-color-scheme: dark) {
    body { background: #16181c; color: #e8e8e8; }
    a { color: #7db8f0; }
    .row input, .row select { border-color: #ffffff40; }
  }
  h1 { font-size: 1.4rem; }
  .field { color: #666; font-size: 0.85rem; text-transform: uppercase;
           letter-spacing: 0.03em; }
  .card { border: 1px solid #8884; border-radius: 10px; padding: 1rem 1.25rem;
          margin-bottom: 1rem; }
  .timeline-item { border-left: 2px solid #8884; padding: 0.25rem 0 0.25rem 1rem;
                    margin-left: 0.4rem; }
  .timeline-item time { color: #666; font-size: 0.85rem; }
  .error { color: #c0392b; }
  a.export { font-size: 0.85rem; }
  .qr-box { background: #fff; border-radius: 8px; padding: 8px; display: inline-block; }
  .qr-caption { font-size: 0.8rem; color: #666; margin-top: 0.3rem; }
  .row { display: flex; gap: 0.5rem; flex-wrap: wrap; align-items: center; margin: 0.4rem 0; }
  .row input, .row select { font: inherit; padding: 0.35rem 0.5rem; border: 1px solid #8886;
                             border-radius: 6px; background: transparent; color: inherit; }
  .row input[type=text], .row input:not([type]) { flex: 1; min-width: 140px; }
  button { font: inherit; padding: 0.35rem 0.9rem; border-radius: 6px; border: 1px solid #8886;
           background: #4a90d9; color: #fff; cursor: pointer; }
  button:disabled { opacity: 0.6; cursor: default; }
  nav { font-size: 0.85rem; margin-bottom: 1rem; display: flex;
        justify-content: space-between; align-items: baseline; flex-wrap: wrap; gap: 0.3rem 1rem; }
  nav a { margin-right: 1rem; }
  nav .links { flex: 1; }
  #auth-status { color: #666; white-space: nowrap; }
  .badge-verified { display: inline-block; font-size: 0.72rem; background: #1a7f37; color: #fff;
                     border-radius: 4px; padding: 0.05rem 0.4rem; margin-left: 0.4rem; }
  .badge-pending { display: inline-block; font-size: 0.72rem; background: #8a6d00; color: #fff;
                    border-radius: 4px; padding: 0.05rem 0.4rem; margin-left: 0.4rem; }
  .badge-error { display: inline-block; font-size: 0.72rem; background: #c0392b; color: #fff;
                  border-radius: 4px; padding: 0.05rem 0.4rem; margin-left: 0.4rem; }
  .sync-status { font-size: 0.85rem; margin: 0.4rem 0 1rem; }
  .details-btn { font-size: 0.72rem; padding: 0.1rem 0.5rem; margin-left: 0.4rem;
                  background: transparent; border-color: #8886; }
  .event-detail { font-size: 0.78rem; background: #8881; border-radius: 6px;
                   padding: 0.5rem 0.7rem; margin: 0.4rem 0 0.6rem; overflow-x: auto;
                   white-space: pre-wrap; word-break: break-word; }
  code.dns { display: block; background: #8881; padding: 0.5rem 0.7rem; border-radius: 6px;
             font-size: 0.85rem; margin: 0.4rem 0; overflow-x: auto; white-space: pre; }
  .print-only { display: none; }
  @media print {
    .no-print { display: none !important; }
    .print-only { display: block; }
    .event-detail-panel { display: none !important; }
    body { max-width: 100%; color: #000; }
    .card, .timeline-item { break-inside: avoid; }
    a { color: #000; text-decoration: none; }
    /* Keep the printable one-pager to one page -- PRINT_TIMELINE_LIMIT
       in the script below must match this nth-child cutoff (limit + 1). */
    #timeline-list > .timeline-item:nth-child(n+9) { display: none; }
  }
</style>
</head>
<body>
<nav class="no-print">
  <span class="links"><a href="/" id="nav-home-link">Passport home</a><a href="/workshop" id="nav-workshop-link">Register a workshop</a></span>
  <span id="auth-status"></span>
  <select id="lang-select" aria-label="Language" style="font:inherit;padding:0.15rem 0.3rem;border-radius:6px;border:1px solid #8886;background:transparent;color:inherit">
    <option value="en">English</option>
    <option value="et">Eesti</option>
  </select>
</nav>
<div id="nav-signin-box" class="no-print" style="display:none">
  <div class="row">
    <input id="nav-otp-email" type="email" placeholder="your email" style="flex:1">
    <button id="nav-otp-request-btn">Send code</button>
  </div>
  <div class="row" id="nav-otp-code-row" style="display:none">
    <input id="nav-otp-code" placeholder="6-digit code" style="max-width:9rem">
    <button id="nav-otp-verify-btn">Verify</button>
  </div>
  <p id="nav-otp-status" class="error"></p>
</div>
<div id="app">Loading…</div>

<script>
// Every value below can originate from an *event*, and POC mode has no
// write access control (see app.py/worker.js module docstrings) -- so
// anyone can append an event containing HTML/script in a text field.
// Escape everything interpolated into innerHTML that isn't a value this
// script itself produced (a uuid regex match, a fixed label).
function esc(s) {
  return String(s ?? "").replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

// occurredAt/recordedAt/verifiedAt are always UTC (Z) or an explicit
// offset on the wire -- Date parses that correctly, and toLocaleString
// renders it in whichever timezone the browser itself is set to.
function fmtTime(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  if (isNaN(d)) return esc(iso);
  return esc(d.toLocaleString(undefined, {
    year: "numeric", month: "short", day: "numeric",
    hour: "2-digit", minute: "2-digit",
  }));
}

const SUPPORTED_LANGS = ["en", "et"];
const LANG_KEY = "ovp_lang";
function getLang() {
  const stored = localStorage.getItem(LANG_KEY);
  if (stored && SUPPORTED_LANGS.includes(stored)) return stored;
  // Best-effort browser-language guess, not a hard requirement -- falls
  // back to English for anything unrecognized rather than guessing wrong.
  const browserLang = (navigator.language || "en").slice(0, 2).toLowerCase();
  return SUPPORTED_LANGS.includes(browserLang) ? browserLang : "en";
}
function setLang(lang) {
  localStorage.setItem(LANG_KEY, lang);
}
function t(key, vars) {
  const str = (I18N[getLang()] && I18N[getLang()][key]) ?? I18N.en[key] ?? key;
  if (!vars) return str;
  return str.replace(/\{(\w+)\}/g, (m, k) => (k in vars ? vars[k] : m));
}

// None of these input rows are real <form> elements (just flex divs), so
// Enter did nothing by default -- wire each group's inputs to click its
// own button instead. Safe to call for ids that don't exist on the
// current page (e.g. a hidden step not yet revealed).
function enterSubmits(inputIds, buttonId) {
  const btn = document.getElementById(buttonId);
  if (!btn) return;
  for (const id of inputIds) {
    const el = document.getElementById(id);
    if (el) el.onkeydown = (e) => { if (e.key === "Enter") { e.preventDefault(); btn.click(); } };
  }
}

async function copyToClipboard(text, btn) {
  try {
    await navigator.clipboard.writeText(text);
  } catch {
    // clipboard API needs a secure context/permission; fall back to a
    // manual select so the user can still Cmd/Ctrl-C it themselves.
    prompt(t("copy_this_prompt"), text);
    return;
  }
  if (btn) {
    const original = btn.textContent;
    btn.textContent = t("copied_btn");
    setTimeout(() => { btn.textContent = original; }, 1500);
  }
}

// One workshop "session" per browser -- a POC-simple stand-in for a real
// login. Storing the signed session token in localStorage is what lets
// "Log an event" on any passport auto-attach it when the domain matches,
// which is the whole point (see the user's "how do I act as this
// workshop" ask). The token itself is only ever obtained via OTP -- there
// is no standing secret anywhere in this system.
const WORKSHOP_SESSION_KEY = "ovp_workshop_session";
function getWorkshopSession() {
  try { return JSON.parse(localStorage.getItem(WORKSHOP_SESSION_KEY)); } catch { return null; }
}
function setWorkshopSession(domain, token, extra) {
  // extra caches {role, name, mechanicId} once /whoami has resolved it, so
  // pages that don't need to re-confirm the role (e.g. the passport log
  // form's hint) don't have to make an extra round trip just to word it
  // right -- the workshop status page still always reconfirms live.
  localStorage.setItem(WORKSHOP_SESSION_KEY, JSON.stringify({ domain, token, ...(extra || {}) }));
}
function clearWorkshopSession() {
  localStorage.removeItem(WORKSHOP_SESSION_KEY);
}

// A separate, plain personal identity -- not tied to any workshop. Its
// only job is to satisfy the provider's base write gate (see app.py's
// _authenticate_write / worker.js's authenticateWrite): using the app
// locally (queuing events in the outbox below) needs no login at all;
// only the moment of actually syncing to a provider does. Any email
// qualifies -- there's no pre-existing record to match against, unlike
// a workshop's owner/mechanic OTP.
const USER_SESSION_KEY = "ovp_user_session";
function getUserSession() {
  try { return JSON.parse(localStorage.getItem(USER_SESSION_KEY)); } catch { return null; }
}
function setUserSession(email, token) {
  localStorage.setItem(USER_SESSION_KEY, JSON.stringify({ email, token }));
}
function clearUserSession() {
  localStorage.removeItem(USER_SESSION_KEY);
}

// Whichever session can authenticate a write to this provider right now
// -- preferring a workshop/mechanic session when it matches the event's
// own producer.domain claim (so that session also earns the verified
// stamp), falling back to the plain personal identity otherwise. Returns
// null if neither is signed in, meaning a sync attempt would just get a
// 401 -- callers use that to show a sign-in prompt instead of trying.
function bestAuthSession(producerDomain) {
  const ws = getWorkshopSession();
  if (producerDomain && ws && ws.domain === producerDomain) return ws;
  const us = getUserSession();
  if (us) return us;
  return ws || null;
}

// A persistent, always-visible top-right indicator -- previously "who's
// signed in" was only ever shown inline on whichever specific page cared
// (the workshop status page, the passport page's log-domain hint), which
// meant leaving that page hid the fact a session was still active at
// all. Lives in <nav>, outside #app, so it survives every page's own
// render() replacing #app's innerHTML -- call this again after any
// sign-in/out action so it never goes stale.
function renderAuthStatus() {
  const el = document.getElementById("auth-status");
  if (!el) return;
  const ws = getWorkshopSession();
  const us = getUserSession();
  const parts = [];
  // No "mechanic"/"owner" label -- these emails are just verified
  // representatives of the domain/workshop, not named individuals with
  // a role to announce in the corner of every page.
  if (ws) parts.push(t("nav_workshop_identity", { email: esc(ws.email || ""), domain: esc(ws.domain) }));
  // The generic (non-workshop) session is a separate, email-scoped login
  // (see setUserSession) -- signing into both with the same address is
  // the common case (e.g. via the workshop's own OTP box), and showing
  // that email twice in the corner reads as a bug, not two identities.
  if (us && (!ws || us.email !== ws.email)) parts.push(esc(us.email));
  if (!parts.length) {
    el.innerHTML = `${t("nav_not_signed_in")} · <a href="#" id="nav-signin-toggle">${t("nav_sign_in")}</a>`;
    document.getElementById("nav-signin-toggle").onclick = (e) => {
      e.preventDefault();
      const box = document.getElementById("nav-signin-box");
      box.style.display = box.style.display === "none" ? "block" : "none";
    };
    return;
  }
  el.innerHTML = `${parts.join(" · ")} <a href="#" id="auth-signout-link">${t("nav_sign_out")}</a>`;
  document.getElementById("auth-signout-link").onclick = (e) => {
    e.preventDefault();
    clearWorkshopSession();
    clearUserSession();
    main(); // re-render the current page too -- its own content may depend on session state
  };
}

// Wired once at load (this box lives outside #app, so it survives every
// page's own render() replacing #app's innerHTML) -- lets "Not signed
// in" actually do something from any page, not just the passport page's
// own inline sign-in box.
function initNavSignin() {
  const requestBtn = document.getElementById("nav-otp-request-btn");
  requestBtn.onclick = async () => {
    const status = document.getElementById("nav-otp-status");
    const email = document.getElementById("nav-otp-email").value.trim();
    if (!email) { status.textContent = t("otp_enter_email"); return; }
    requestBtn.disabled = true;
    const rr = await api("/v1/auth/otp/request", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email }),
    });
    requestBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    status.textContent = t("otp_check_email");
    document.getElementById("nav-otp-code-row").style.display = "flex";
  };
  const verifyBtn = document.getElementById("nav-otp-verify-btn");
  verifyBtn.onclick = async () => {
    const status = document.getElementById("nav-otp-status");
    const email = document.getElementById("nav-otp-email").value.trim();
    const code = document.getElementById("nav-otp-code").value.trim();
    if (!code) { status.textContent = t("otp_enter_code"); return; }
    verifyBtn.disabled = true;
    const rr = await api("/v1/auth/otp/verify", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email, code }),
    });
    verifyBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    setUserSession(email, rr.body.token);
    document.getElementById("nav-signin-box").style.display = "none";
    document.getElementById("nav-otp-email").value = "";
    document.getElementById("nav-otp-code").value = "";
    document.getElementById("nav-otp-code-row").style.display = "none";
    status.textContent = "";
    renderAuthStatus();
    main(); // refresh the current page too -- its content may depend on session state
  };
  enterSubmits(["nav-otp-email"], "nav-otp-request-btn");
  enterSubmits(["nav-otp-code"], "nav-otp-verify-btn");
}

async function api(path, opts) {
  const resp = await fetch(path, opts);
  let body = null;
  try { body = await resp.json(); } catch { /* non-JSON body (export) */ }
  return { ok: resp.ok, status: resp.status, body };
}

// --- Local-first outbox --------------------------------------------------
// Every event is written here FIRST, rendered immediately, then sent in the
// background -- same shape as the desktop app's local-vs-cloud model (see
// docs/ARCHITECTURE.md). recordedAt is set at enqueue time (this browser's
// local log), not at server-sync time -- that's correct, not a bug: the
// provider never overwrites a producer-set recordedAt (see app.py's
// append_event docstring), so a queued-while-offline event keeps the time
// it actually happened, exactly like a git commit keeps its author date
// regardless of when it's later pushed.
const PRINT_TIMELINE_LIMIT = 8; // keep the printable one-pager to one page
let currentPassportId = null;
let currentTimelineRows = [];
let exportCache = {}; // passport id -> Promise<raw events[]>, fetched lazily on first "Details" click

function outboxKey(id) { return `ovp_outbox_${id}`; }
function loadOutbox(id) {
  try { return JSON.parse(localStorage.getItem(outboxKey(id))) || []; } catch { return []; }
}
function saveOutbox(id, items) {
  if (items.length) localStorage.setItem(outboxKey(id), JSON.stringify(items));
  else localStorage.removeItem(outboxKey(id));
}

// A brand-new passport is minted entirely client-side (see createPassport)
// and never touches any provider until the first sync -- these two flags
// are how renderPassport tells "a passport I created locally, just not
// synced yet" apart from "a random/typo'd id nobody's ever heard of",
// and how flushOutbox avoids re-POSTing /v1/passports on every sync once
// it's already succeeded once.
function knownLocalKey(id) { return `ovp_known_local_${id}`; }
function markKnownLocal(id) { localStorage.setItem(knownLocalKey(id), "1"); }
function isKnownLocal(id) { return localStorage.getItem(knownLocalKey(id)) === "1" || loadOutbox(id).length > 0; }

function registeredKey(id) { return `ovp_registered_${id}`; }
function markRegistered(id) { localStorage.setItem(registeredKey(id), "1"); }
function isRegistered(id) { return localStorage.getItem(registeredKey(id)) === "1"; }

// Favorites are purely a local bookmark list -- there's no server-side
// concept of "my passports" or "my workshops" (there's no account to hang
// one off of, see the whole local-first/OTP-only design elsewhere in this
// file), just a quick way back to specific passports *or* workshops from
// the home page without re-scanning a sticker or re-pasting an id/link/
// domain every time. label is a best-effort snapshot of the
// description/name at the moment it was favorited (not kept live-updated
// -- it's just there so the home page list isn't a wall of bare
// uuids/domains). kind distinguishes the two ("passport" is the default,
// for entries saved before workshops could be favorited too); passport
// ids and workshop domains never collide, but kind is still checked so
// removing one doesn't accidentally remove the other.
const FAVORITES_KEY = "ovp_favorites";
function loadFavorites() {
  try { return JSON.parse(localStorage.getItem(FAVORITES_KEY)) || []; } catch { return []; }
}
function saveFavorites(items) {
  if (items.length) localStorage.setItem(FAVORITES_KEY, JSON.stringify(items));
  else localStorage.removeItem(FAVORITES_KEY);
}
function isFavorite(id, kind = "passport") {
  return loadFavorites().some(f => f.id === id && (f.kind || "passport") === kind);
}
function addFavorite(id, label, kind = "passport") {
  const items = loadFavorites().filter(f => !(f.id === id && (f.kind || "passport") === kind));
  items.unshift({ id, label: label || id, kind, addedAt: Date.now() });
  saveFavorites(items);
}
function removeFavorite(id, kind = "passport") {
  saveFavorites(loadFavorites().filter(f => !(f.id === id && (f.kind || "passport") === kind)));
}

// A just-synced event can still be briefly invisible in a fresh GET --
// Cloudflare KV's list() is only eventually consistent (documented
// elsewhere in this project: ~15-20s observed lag). Without this, a
// successful sync would clear the "pending" badge and the very next
// render (reading straight from the server) could show the event
// vanishing entirely for a few seconds -- confusing, and easy to mistake
// for data loss. Bridging that gap client-side: keep the server-echoed
// event around for a short grace window and merge it into the timeline
// regardless of whether the server's own GET has caught up yet.
const RECENT_SYNC_GRACE_MS = 60_000;
function recentSyncKey(id) { return `ovp_recent_${id}`; }
function loadRecentSynced(id) {
  let items;
  try { items = JSON.parse(localStorage.getItem(recentSyncKey(id))) || []; } catch { items = []; }
  const fresh = items.filter(item => Date.now() - item.syncedAt < RECENT_SYNC_GRACE_MS);
  if (fresh.length !== items.length) saveRecentSynced(id, fresh);
  return fresh;
}
function saveRecentSynced(id, items) {
  if (items.length) localStorage.setItem(recentSyncKey(id), JSON.stringify(items));
  else localStorage.removeItem(recentSyncKey(id));
}
function rememberRecentlySynced(id, ev) {
  const items = loadRecentSynced(id);
  items.push({ ev, syncedAt: Date.now() });
  saveRecentSynced(id, items);
}

// Registering the passport itself is the first thing a sync needs -- a
// locally-created id has never been mentioned to this provider until
// now. Requires *some* signed-in identity (see app.py's
// _authenticate_write): this is the exact moment "add locally
// anonymously" ends and "push to cloud" begins. A 409 (already
// registered -- e.g. a previous sync succeeded but this browser's flag
// got cleared) counts as success, same as 201.
async function ensureRegistered(id) {
  if (isRegistered(id)) return true;
  const session = bestAuthSession(null);
  if (!session) return false; // not signed in -- nothing to even attempt
  let r;
  try {
    r = await api("/v1/passports", {
      method: "POST",
      headers: { "content-type": "application/json", authorization: `Bearer ${session.token}` },
      body: JSON.stringify({ id }),
    });
  } catch {
    return false; // offline
  }
  if (r.ok || r.status === 409) { markRegistered(id); return true; }
  return false; // e.g. 401 -- session missing/expired/invalid
}

let flushing = false;
async function flushOutbox(id) {
  if (flushing) return;
  flushing = true;
  try {
    const outbox = loadOutbox(id);
    if (!outbox.length) return;
    if (!(await ensureRegistered(id))) {
      // Not signed in (or offline) -- leave everything queued.
      // renderPassport shows a sign-in prompt in this state; there's
      // nothing to retry here until that changes.
      return;
    }

    let changed = false;
    for (const item of outbox) {
      if (item.error) continue; // needs a manual discard, not auto-retried forever
      // Recomputed fresh per item, not baked in at enqueue time: signing
      // in can happen *after* an event was queued anonymously, and this
      // is what lets that later sign-in actually authenticate the sync.
      const session = bestAuthSession(item.ev.producer?.domain);
      if (!session) break; // signed out since queuing -- wait for sign-in
      let r;
      try {
        r = await api(`/v1/passports/${id}/events`, {
          method: "POST",
          headers: { "content-type": "application/json", authorization: `Bearer ${session.token}` },
          body: JSON.stringify(item.ev),
        });
      } catch {
        break; // offline (fetch itself threw) -- stop, leave the rest queued
      }
      changed = true;
      if (r.ok) {
        item.sent = true;
        rememberRecentlySynced(id, r.body);
      } else if (r.status === 401 || r.status === 403) {
        break; // invalid/expired session -- not a per-item error to show
      } else {
        item.error = r.body?.error || `HTTP ${r.status}`;
      }
    }
    const remaining = outbox.filter(item => !item.sent);
    saveOutbox(id, remaining);
    if (changed && currentPassportId === id) {
      renderPassport(document.getElementById("app"), id);
    }
  } finally {
    flushing = false;
  }
}

window.addEventListener("online", () => { if (currentPassportId) flushOutbox(currentPassportId); });

async function enqueueEvent(id, ev) {
  const outbox = loadOutbox(id);
  outbox.push({ ev });
  saveOutbox(id, outbox);
  await renderPassport(document.getElementById("app"), id);
  flushOutbox(id);
}

function discardOutboxItem(id, evId) {
  saveOutbox(id, loadOutbox(id).filter(item => item.ev.id !== evId));
  renderPassport(document.getElementById("app"), id);
}

async function loadExportEvents(id) {
  if (!exportCache[id]) {
    exportCache[id] = (async () => {
      const resp = await fetch(`/v1/passports/${id}/export`);
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const text = await resp.text();
      return text.split("\n").filter(Boolean).map(l => JSON.parse(l));
    })();
  }
  return exportCache[id];
}

async function showEventDetail(id, idx, detailEl, btn) {
  if (detailEl.dataset.open === "1") {
    detailEl.dataset.open = "0";
    detailEl.style.display = "none";
    btn.textContent = t("details_btn");
    return;
  }
  btn.disabled = true;
  detailEl.style.display = "block";
  detailEl.innerHTML = `<p class="qr-caption">${t("loading_ellipsis")}</p>`;
  try {
    const row = currentTimelineRows[idx];
    let raw = row.raw;
    if (!raw) {
      // Older, already-server-confirmed rows don't carry the raw event
      // client-side (the server's own reduced timeline summary doesn't
      // include the event id -- see ovpf_core.reduce()) -- fetch the
      // full export once and match on (occurredAt, type), which this
      // app always makes effectively unique per event.
      const events = await loadExportEvents(id);
      const matches = events.filter(e => e.occurredAt === row.at && e.type === row.type);
      raw = matches.length === 1 ? matches[0] : matches;
    }
    detailEl.innerHTML = `<pre class="event-detail">${esc(JSON.stringify(raw, null, 2))}</pre>`;
    detailEl.dataset.open = "1";
    btn.textContent = t("hide_details_btn");
  } catch (e) {
    detailEl.innerHTML = `<p class="error">${t("could_not_load_details", { msg: esc(e.message) })}</p>`;
  } finally {
    btn.disabled = false;
  }
}

function createPassport() {
  // Entirely local, entirely anonymous -- no server call, no login. A v4
  // uuid is fine here (same reasoning as envelope()'s event ids):
  // uniqueness is what matters, ordering already comes from
  // occurredAt/recordedAt. This provider only hears about the passport
  // the moment something actually gets synced (see ensureRegistered).
  const id = crypto.randomUUID();
  markKnownLocal(id);
  location.href = `/p/${id}`;
}

function extractPassportUuid(text) {
  const m = (text || "").match(/[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}/);
  return m ? m[0] : null;
}

// --- Camera QR scanning ------------------------------------------------
// Anyone -- a mechanic mid-job, an enthusiast, a car owner -- should be
// able to open a *different* car's passport without leaving this site or
// switching to a separate camera app. Prefers the browser's built-in
// BarcodeDetector (zero extra bytes, hardware-accelerated); only
// lazy-loads the vendored jsQR fallback (~130KB) for browsers that lack
// it, and only once the user actually asks to scan -- most page views
// never pay for it at all.
let scanStream = null;
let scanRAF = null;

function stopScan() {
  if (scanRAF) cancelAnimationFrame(scanRAF);
  scanRAF = null;
  if (scanStream) scanStream.getTracks().forEach(t => t.stop());
  scanStream = null;
}

function ensureJsQR() {
  if (window.jsQR) return Promise.resolve();
  return new Promise((resolve, reject) => {
    const s = document.createElement("script");
    s.src = "/jsqr.bundle.js";
    s.onload = resolve;
    s.onerror = () => reject(new Error(t("scan_decoder_error")));
    document.head.appendChild(s);
  });
}

async function startScan(statusEl) {
  const useNative = "BarcodeDetector" in window;
  if (!useNative) {
    statusEl.textContent = t("scan_loading");
    try { await ensureJsQR(); } catch (e) { statusEl.textContent = e.message; return; }
  }
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
  } catch (e) {
    statusEl.textContent = t("scan_camera_error", { msg: e.message || e.name });
    return;
  }
  scanStream = stream;
  const video = document.getElementById("scan-video");
  video.srcObject = stream;
  await video.play();
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  const detector = useNative ? new BarcodeDetector({ formats: ["qr_code"] }) : null;
  statusEl.textContent = t("scan_point_camera");

  const tick = async () => {
    if (!scanStream) return; // stopped
    let value = null;
    try {
      if (useNative) {
        const codes = await detector.detect(video);
        if (codes.length) value = codes[0].rawValue;
      } else if (video.videoWidth) {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const code = window.jsQR(imageData.data, imageData.width, imageData.height);
        if (code) value = code.data;
      }
    } catch { /* a frame that fails to decode is normal -- just keep trying */ }

    if (value) {
      const uuid = extractPassportUuid(value);
      stopScan();
      if (uuid) { location.href = `/p/${uuid}`; }
      else { statusEl.textContent = t("scan_not_passport"); }
      return;
    }
    scanRAF = requestAnimationFrame(tick);
  };
  tick();
}

  // provider's own website is a real entry point, not just a viewer
  // for passports created elsewhere (the desktop app, curl, etc).

    <p>${t("home_intro", { code: "<code>/p/&lt;uuid&gt;</code>" })}</p>
    <button id="create-btn">${t("home_create_btn")}</button>

    <h2>${t("home_scan_heading")}</h2>

    <div id="scan-area" style="display:none">
      <video id="scan-video" style="width:100%;max-width:360px;border-radius:8px;display:block;margin:0.5rem 0;" playsinline muted></video>
      <p id="scan-status" class="qr-caption"></p>
      <button id="scan-cancel-btn">${t("home_scan_cancel")}</button>
    </div>

    <h2>${t("home_open_heading")}</h2>
    <p>${t("home_open_intro")}</p>
    <div class="row">
      <input id="open-id" placeholder="${esc(t("home_open_placeholder"))}">
      <button id="open-btn">${t("home_open_btn")}</button>

  document.getElementById("create-btn").onclick = createPassport;
  document.getElementById("open-btn").onclick = () => {

    if (!uuid) { status.textContent = t("home_open_invalid"); return; }
    location.href = `/p/${uuid}`;
  };
  enterSubmits(["open-id"], "open-btn");
  document.querySelectorAll(".favorite-remove-btn").forEach(btn => {
    btn.onclick = () => { removeFavorite(btn.dataset.id, btn.dataset.kind); renderHome(app); };
  });
  document.getElementById("scan-btn").onclick = () => {
    document.getElementById("scan-area").style.display = "block";
    document.getElementById("scan-btn").style.display = "none";
    startScan(document.getElementById("scan-status"));
  };
  document.getElementById("scan-cancel-btn").onclick = () => {
    stopScan();
    document.getElementById("scan-area").style.display = "none";
    document.getElementById("scan-btn").style.display = "inline-block";
    document.getElementById("scan-status").textContent = "";
  };
}

async function renderPassport(app, id) {
  currentPassportId = id;
  const cacheKey = `ovp_state_${id}`;
  let state, offlineLoad = false, neverSynced = false;
  try {
    const r = await api(`/v1/passports/${id}`);
    if (r.status === 404) {
      if (!isKnownLocal(id)) {
        app.innerHTML = `<p class='error'>${t("no_such_passport")}</p>`;
        return;
      }
      // Minted entirely client-side (see createPassport) and never
      // synced to this provider -- not an error, just "not pushed yet".
      // ensureRegistered (inside flushOutbox) is what actually creates
      // it server-side, once there's something queued and someone's
      // signed in to push it.
      state = { event_count: 0 };
      neverSynced = true;
    } else if (!r.ok) {
      app.innerHTML = `<p class="error">${t("could_not_load_passport", { status: r.status })}</p>`;
      return;
    } else {
      state = r.body;
      localStorage.setItem(cacheKey, JSON.stringify(state));
      // Positive proof the provider already knows this passport -- e.g.
      // registered from a different browser/device, or by qr.py/OpenDiag
      // directly. isRegistered is otherwise just a local cache of *this*
      // browser's own ensureRegistered calls, so without this it stays
      // false forever for a passport this browser never registered
      // itself, even once a real GET here proves it's long since synced.
      markRegistered(id);
    }
  } catch {
    // Offline and the very fetch() threw -- fall back to the last copy this
    // browser saw, so the page (and any queued events) still render instead
    // of a blank error. This is the local-first promise: the provider is an
    // origin to sync with, not something the page depends on to exist.
    try { state = JSON.parse(localStorage.getItem(cacheKey)); } catch { state = null; }
    if (!state) {
      if (isKnownLocal(id)) {
        state = { event_count: 0 };
        neverSynced = true;
      } else {
        app.innerHTML = `<p class='error'>${t("offline_no_cache")}</p>`;
        return;
      }
    } else {
      offlineLoad = true;
    }
  }
  // Queued-but-not-yet-synced events are folded into the same timeline,
  // sorted alongside confirmed ones -- a pending oil change should show up
  // right where it happened, not in a separate "drafts" list. Recently-
  // synced events (successfully posted, but not necessarily visible in
  // *this* state yet -- see RECENT_SYNC_GRACE_MS above) are merged in too,
  // so a just-logged event never appears to vanish while the server's own
  // read catches up. Server timeline summaries don't carry the event's
  // id (see ovpf_core.reduce()), so de-duping recent-synced entries once
  // they do show up server-side matches on (occurredAt, type) instead --
  // effectively unique in practice, since this UI always sets occurredAt
  // to the exact millisecond of submission.
  const outbox = loadOutbox(id);
  const alreadyServerSide = (at, type) =>
    (state.timeline || []).some(t => t.at === at && t.type === type);
  const recentSynced = loadRecentSynced(id).filter(item => !alreadyServerSide(item.ev.occurredAt, item.ev.type));
  saveRecentSynced(id, recentSynced); // prune anything the server now reflects

  // The header card (VIN/make/model/year/mileage) otherwise only ever
  // reads state.vehicle/state.mileage -- server-reduced fields that lag
  // behind outbox/recentSynced by definition (that's the whole point of
  // both). Without this, saving a VIN edit could show "✓ Synced" (the
  // event really did reach the provider) while the header still showed
  // the old value for however long the server's own read takes to catch
  // up -- confusing, and easy to mistake for the edit having silently
  // failed. Overlaying pending + recently-synced VehicleIdentified/
  // odometer data in event-time order mirrors ovpf_core.reduce()'s exact
  // folding logic, so the header shows what's already true from this
  // browser's own perspective, not what the server's read has caught up to.
  const pendingVehicleEvents = [...outbox.map(i => i.ev), ...recentSynced.map(i => i.ev)]
    .slice().sort((a, b) => (a.occurredAt || "").localeCompare(b.occurredAt || ""));
  let v = { ...(state.vehicle || {}) };
  let mileageState = state.mileage || null;
  for (const ev of pendingVehicleEvents) {
    const d = ev.data || {};
    if (ev.type === "VehicleIdentified") v = { ...v, ...(d.vehicle || d) };
    let od = null;
    if (d.odometer && typeof d.odometer.value === "number") od = [d.odometer.value, d.odometer.unit || "KMT"];
    else if (ev.type === "OdometerReading" && typeof d.value === "number") od = [d.value, d.unit || "KMT"];
    if (od && (!mileageState || od[0] > mileageState.value)) mileageState = { value: od[0], unit: od[1] };
  }
  const desc = [v.modelYear, v.make, v.model].filter(Boolean).map(esc).join(" ");
  const mileage = mileageState ? `${esc(mileageState.value)} ${esc(mileageState.unit)}` : t("field_mileage_unknown");

  const outboxTimeline = outbox.map(item => ({
    at: item.ev.occurredAt, type: item.ev.type, producer: item.ev.producer?.name,
    pending: !item.error, error: item.error, evId: item.ev.id, raw: item.ev,
  }));
  const recentTimeline = recentSynced.map(item => ({
    at: item.ev.occurredAt, type: item.ev.type, producer: item.ev.producer?.name,
    producerDomain: item.ev.producer?.domain || null, producerVerified: !!item.ev.producer?.verified,
    evId: item.ev.id, raw: item.ev,
  }));
  const combined = [...(state.timeline || []), ...recentTimeline, ...outboxTimeline]
    .slice().sort((a, b) => (a.at || "").localeCompare(b.at || "")).reverse();
  currentTimelineRows = combined;

  const timeline = combined.map((row, idx) => {
    let badge = "";
    if (row.error) {
      badge = `<span class="badge-error" title="${esc(row.error)}">${t("failed_badge")}</span> ` +
        `<button class="no-print discard-btn" data-evid="${esc(row.evId)}">${t("discard_btn")}</button>`;
    } else if (row.pending) {
      badge = `<span class="badge-pending" title="${esc(t("pending_badge_title"))}">${t("pending_badge")}</span>`;
    } else if (row.producerVerified) {
      badge = `<span class="badge-verified" title="${esc(t("verified_badge_title"))}">✓ ${esc(row.producerDomain)}</span>`;
    }
    // Skip the plain "— producer" text once the badge already shows the
    // verified domain -- older events (before producer.name stopped
    // being set to the domain for workshop attribution) would otherwise
    // print the same domain twice on one line.
    const producerText = (row.producer && !row.producerVerified) ? " — " + esc(row.producer) : "";
    return `<div class="timeline-item"><time datetime="${esc(row.at)}" title="${esc(row.at)} (UTC/as recorded)">${fmtTime(row.at)}</time><br>
     <strong>${esc(row.type)}</strong>${producerText}${badge}
     <button class="no-print details-btn" data-idx="${idx}">${t("details_btn")}</button>
     <div class="event-detail-panel" id="detail-${idx}" style="display:none"></div></div>`;
  }).join("") || `<p>${t("no_events_yet")}</p>`;

  const faults = (state.open_faults || []).map(f =>
    `<li>${esc(f.module)} ${esc(f.code)} — ${esc(f.text)}</li>`
  ).join("");

  const pendingCount = outbox.filter(i => !i.error).length;
  const errorCount = outbox.filter(i => i.error).length;
  // Using the app is entirely anonymous -- creating a passport, adding
  // VIN info, logging events all just queue locally (see createPassport/
  // enqueueEvent). Only the moment something actually needs to reach a
  // provider (registering, or pushing a queued event) does a sign-in
  // start to matter -- see ensureRegistered/flushOutbox.
  const userSession = getUserSession();
  const hasAnySession = !!(userSession || getWorkshopSession());
  const needsSync = neverSynced || !isRegistered(id) || pendingCount > 0;
  const needsSignIn = needsSync && !hasAnySession && !offlineLoad;

  // offlineLoad and pendingCount are independent facts -- being offline
  // right now doesn't mean there's nothing queued, and that's exactly the
  // "3 commits ahead, can't reach origin" case this status line is for.
  let syncStatus;
  if (errorCount) syncStatus = t("sync_errors", { count: errorCount }) + `<button id="sync-now-btn">${t("retry_btn")}</button>`;
  else if (needsSignIn) syncStatus = t("sync_needs_signin");
  else if (offlineLoad && pendingCount) syncStatus = t("sync_offline_pending", { count: pendingCount }) +
    `<button id="sync-now-btn">${t("sync_try_now")}</button>`;
  else if (offlineLoad) syncStatus = t("sync_offline_cached");
  else if (pendingCount) syncStatus = t("sync_pending", { count: pendingCount }) +
    `${navigator.onLine ? t("sync_syncing") : t("sync_will_sync")} <button id="sync-now-btn">${t("sync_now_btn")}</button>`;
  else if (neverSynced || !isRegistered(id)) syncStatus = t("sync_never");
  // Fully synced, nothing pending, nothing wrong -- nothing to say. Who's
  // signed in is already shown once, in the nav; repeating it here (this
  // used to append "(signed in as ...)") was just the same fact twice.
  else syncStatus = "";

  app.innerHTML = `
    <h1>${desc || t("passport_default_heading")}</h1>
    ${syncStatus ? `<p id="sync-status" class="sync-status no-print">${syncStatus}</p>` : ""}
    ${needsSignIn ? `
    <div class="no-print" id="user-signin-box">
      <p class="qr-caption">${t("signin_box_note", { em: "<em>", emEnd: "</em>" })}</p>
      <div class="row">
        <input id="user-otp-email" type="email" placeholder="${esc(t("otp_email_placeholder"))}" style="flex:1">
        <button id="user-otp-request-btn">${t("otp_send_code")}</button>
      </div>
      <div class="row" id="user-otp-code-row" style="display:none">
        <input id="user-otp-code" placeholder="${esc(t("otp_code_placeholder"))}" style="max-width:9rem">
        <button id="user-otp-verify-btn">${t("otp_verify")}</button>
      </div>
      <p id="user-otp-status" class="error"></p>
    </div>` : ""}
    <p class="print-only qr-caption">${t("printed_at", { time: fmtTime(new Date().toISOString()), url: esc(location.href) })}</p>
    <div class="card">
      <div class="field">${t("field_vin")}</div><div>${esc(v.vin) || t("field_not_set")}</div>
      <div class="field">${t("field_mileage")}</div><div>${mileage}</div>
      ${faults ? `<div class="field">${t("field_open_faults")}</div><ul>${faults}</ul>` : ""}
    </div>
    <p class="no-print"><button id="vehicle-edit-toggle-btn">${t("edit_vehicle_info_toggle")}</button></p>
    <div class="no-print" id="vehicle-edit-box" style="display:none">
      <p>${t("edit_vehicle_info_note", { code: "<code>VehicleIdentified</code>" })}</p>
      <div class="row">
        <input id="edit-vin" placeholder="${esc(t("vin_placeholder"))}" value="${esc(v.vin || "")}">
        <input id="edit-make" placeholder="${esc(t("make_placeholder"))}" value="${esc(v.make || "")}">
        <input id="edit-model" placeholder="${esc(t("model_placeholder"))}" value="${esc(v.model || "")}">
        <input id="edit-year" placeholder="${esc(t("year_placeholder"))}" style="width:5rem" value="${esc(v.modelYear || "")}">
        <button id="edit-btn">${t("save_btn")}</button>
      </div>
      <p id="edit-status" class="error"></p>
    </div>
    <div class="qr-box"><canvas id="qr"></canvas></div>
    <div class="qr-caption">${t("qr_caption")}</div>
    <div class="row no-print">
      <input id="qr-link" value="${esc(location.href)}" readonly style="flex:1">
      <button id="qr-copy-btn">${t("copy_link_btn")}</button>
      <button id="print-btn">${t("print_btn")}</button>
      <button id="favorite-btn">${isFavorite(id) ? t("favorite_remove_btn") : t("favorite_add_btn")}</button>
    </div>

    <div class="no-print">
      <h2>${t("log_event_heading")}</h2>
      <div class="row">
        <select id="log-type">
          <option value="ServicePerformed">${t("log_type_service")}</option>
          <option value="TyresInstalled">${t("log_type_tyres")}</option>
          <option value="PartReplaced">${t("log_type_part")}</option>
          <option value="OdometerReading">${t("log_type_odometer")}</option>
        </select>
        <input id="log-desc" placeholder="${esc(t("log_desc_placeholder"))}">
        <input id="log-odo" placeholder="${esc(t("log_odo_placeholder"))}" style="width:9rem">
        <button id="log-btn">${t("log_btn")}</button>
      </div>
      <p id="log-session-hint" class="qr-caption"></p>
      <p id="log-status" class="error"></p>
    </div>

    <h2>${t("timeline_heading")}</h2>
    <p class="no-print">
      <button id="verify-integrity-btn">${t("verify_integrity_btn")}</button>
      <span id="verify-integrity-result" class="qr-caption"></span>
    </p>
    <div id="timeline-list">${timeline}</div>
    <p class="print-only qr-caption">${combined.length > PRINT_TIMELINE_LIMIT
      ? t("print_truncated", { limit: PRINT_TIMELINE_LIMIT, total: combined.length, url: esc(location.href) })
      : ""}</p>
    <p class="no-print"><a class="export" href="/v1/passports/${id}/export">${t("export_link")}</a></p>
  `;

  // Same-origin URL for this exact passport -- whichever provider is
  // serving this page, that's what a scan should open again.
  QRCode.toCanvas(document.getElementById("qr"), location.href,
    { errorCorrectionLevel: "M", margin: 2, scale: 5 });

  document.getElementById("qr-copy-btn").onclick = () =>
    copyToClipboard(location.href, document.getElementById("qr-copy-btn"));
  document.getElementById("print-btn").onclick = () => window.print();
  document.getElementById("favorite-btn").onclick = () => {
    const btn = document.getElementById("favorite-btn");
    if (isFavorite(id)) { removeFavorite(id); btn.textContent = t("favorite_add_btn"); }
    else { addFavorite(id, desc || t("passport_default_heading")); btn.textContent = t("favorite_remove_btn"); }
  };
  document.getElementById("edit-btn").onclick = () => submitVehicleInfo(id);
  enterSubmits(["edit-vin", "edit-make", "edit-model", "edit-year"], "edit-btn");
  const vehicleEditToggleBtn = document.getElementById("vehicle-edit-toggle-btn");
  const vehicleEditBox = document.getElementById("vehicle-edit-box");
  vehicleEditToggleBtn.onclick = () => {
    const showing = vehicleEditBox.style.display !== "none";
    vehicleEditBox.style.display = showing ? "none" : "block";
    vehicleEditToggleBtn.textContent = showing ? t("edit_vehicle_info_toggle") : t("edit_vehicle_info_hide");
  };
  document.getElementById("log-btn").onclick = () => submitLogEvent(id, v);
  enterSubmits(["log-desc", "log-odo"], "log-btn");
  document.getElementById("verify-integrity-btn").onclick = () => verifyIntegrity(
    id, document.getElementById("verify-integrity-btn"), document.getElementById("verify-integrity-result"));

  const syncNowBtn = document.getElementById("sync-now-btn");
  if (syncNowBtn) syncNowBtn.onclick = () => {
    syncNowBtn.disabled = true;
    // Clear any prior failures too -- "Retry" and "Sync now" are the same
    // action: attempt every queued event again right now.
    const items = loadOutbox(id);
    items.forEach(item => delete item.error);
    saveOutbox(id, items);
    flushOutbox(id);
  };

  const userOtpRequestBtn = document.getElementById("user-otp-request-btn");
  if (userOtpRequestBtn) userOtpRequestBtn.onclick = async () => {
    const status = document.getElementById("user-otp-status");
    const email = document.getElementById("user-otp-email").value.trim();
    if (!email) { status.textContent = t("otp_enter_email"); return; }
    userOtpRequestBtn.disabled = true;
    const rr = await api("/v1/auth/otp/request", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email }),
    });
    userOtpRequestBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    status.textContent = t("otp_check_email");
    document.getElementById("user-otp-code-row").style.display = "flex";
  };
  const userOtpVerifyBtn = document.getElementById("user-otp-verify-btn");
  if (userOtpVerifyBtn) userOtpVerifyBtn.onclick = async () => {
    const status = document.getElementById("user-otp-status");
    const email = document.getElementById("user-otp-email").value.trim();
    const code = document.getElementById("user-otp-code").value.trim();
    if (!code) { status.textContent = t("otp_enter_code"); return; }
    userOtpVerifyBtn.disabled = true;
    const rr = await api("/v1/auth/otp/verify", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email, code }),
    });
    userOtpVerifyBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    setUserSession(email, rr.body.token);
    renderAuthStatus();
    renderPassport(app, id);
  };
  enterSubmits(["user-otp-email"], "user-otp-request-btn");
  enterSubmits(["user-otp-code"], "user-otp-verify-btn");
  const userSignoutLink = document.getElementById("user-signout-link");
  if (userSignoutLink) userSignoutLink.onclick = (e) => {
    e.preventDefault();
    clearUserSession();
    renderAuthStatus();
    renderPassport(app, id);
  };
  document.querySelectorAll(".discard-btn").forEach(btn => {
    btn.onclick = () => {
      if (confirm(t("discard_confirm"))) {
        discardOutboxItem(id, btn.dataset.evid);
      }
    };
  });
  document.querySelectorAll(".details-btn").forEach(btn => {
    btn.onclick = () => {
      const idx = Number(btn.dataset.idx);
      showEventDetail(id, idx, document.getElementById(`detail-${idx}`), btn);
    };
  });

  // If this browser is signed in as a workshop (owner or a specific
  // mechanic), every event logged from here is automatically attributed
  // and verified -- there's nothing to type in, just a note explaining
  // why. Session is read from cache (set by the workshop status page's
  // /whoami check), not re-fetched here, so opening a passport doesn't
  // cost an extra round trip.
  const session = getWorkshopSession();
  if (session) {
    document.getElementById("log-session-hint").textContent =
      t("log_session_hint", { email: session.email || "", domain: session.domain });
  }

  // A page load is also a sync opportunity -- e.g. events queued last time
  // this browser was offline, on a passport reopened after reconnecting.
  if (!offlineLoad && pendingCount) flushOutbox(id);
}

// --- Client-side hash-chain verification -----------------------------------
// A vendored port of ovp-provider-cloudflare/src/ovpf-core.js's
// canonicalize/eventHash/verifyChain -- deliberately re-implemented here
// rather than trusted from whichever server rendered this page, so an
// enthusiast (or anyone) can confirm the exported log's hash chain is
// actually intact using only their own browser, the same conformance-
// tested algorithm, computed independently a third time (Python, the
// Cloudflare Worker, and now here).
function ovpfCanonJSON(obj) {
  if (obj === null || obj === undefined) return "null";
  if (typeof obj === "boolean") return obj ? "true" : "false";
  if (typeof obj === "number") {
    if (!Number.isFinite(obj)) throw new Error(`${obj} has no canonical JSON representation`);
    return String(obj);
  }
  if (typeof obj === "string") return JSON.stringify(obj);
  if (Array.isArray(obj)) return "[" + obj.map(ovpfCanonJSON).join(",") + "]";
  if (typeof obj === "object") {
    const keys = Object.keys(obj).sort();
    return "{" + keys.map(k => JSON.stringify(k) + ":" + ovpfCanonJSON(obj[k])).join(",") + "}";
  }
  throw new Error(`${typeof obj} has no canonical JSON representation`);
}

async function ovpfEventHash(event) {
  const { hash, ...body } = event;
  const bytes = new TextEncoder().encode(ovpfCanonJSON(body));
  const digest = await crypto.subtle.digest("SHA-256", bytes);
  return "sha256:" + [...new Uint8Array(digest)].map(b => b.toString(16).padStart(2, "0")).join("");
}

async function ovpfVerifyChain(events) {
  const problems = [];
  let prev = null;
  for (let i = 0; i < events.length; i++) {
    const ev = events[i];
    const eid = ev.id || `#${i}`;
    if (!ev.hash) { problems.push(`${eid}: no hash (log not sealed)`); prev = null; continue; }
    if ((await ovpfEventHash(ev)) !== ev.hash) problems.push(`${eid}: hash mismatch (event altered)`);
    if (i === 0) {
      if (ev.prevHash) problems.push(`${eid}: genesis must not carry prevHash`);
    } else if (ev.prevHash !== prev) {
      problems.push(`${eid}: broken link (prevHash != previous hash)`);
    }
    prev = ev.hash;
  }
  return problems;
}

async function verifyIntegrity(id, btn, resultEl) {
  btn.disabled = true;
  resultEl.className = "qr-caption";
  resultEl.textContent = t("verify_checking");
  try {
    const resp = await fetch(`/v1/passports/${id}/export`);
    if (resp.status === 404) {
      // A locally-created, not-yet-synced passport (see createPassport)
      // has nothing to export yet -- that's not a failure, just nothing
      // to verify until it's pushed to this provider.
      resultEl.textContent = t("verify_never_synced");
      return;
    }
    if (!resp.ok) throw new Error(`export failed: HTTP ${resp.status}`);
    const text = await resp.text();
    const events = text.split("\n").filter(Boolean).map(l => JSON.parse(l));
    const problems = await ovpfVerifyChain(events);
    if (!events.length) {
      resultEl.textContent = t("verify_no_events");
    } else if (!problems.length) {
      resultEl.textContent = t("verify_ok", { count: events.length });
    } else {
      resultEl.className = "error";
      resultEl.textContent = t("verify_problems", { count: problems.length, problems: problems.join("; ") });
    }
  } catch (e) {
    resultEl.className = "error";
    resultEl.textContent = t("verify_error", { msg: e.message });
  } finally {
    btn.disabled = false;
  }
}

function envelope(vehicleId, type, data, producer) {
  const now = new Date().toISOString();
  return {
    "@context": "https://openvehiclepassport.org/ns/v0.1",
    id: "urn:uuid:" + crypto.randomUUID(), // v4 is fine here: uniqueness is
    // what matters for dedup, ordering already comes from occurredAt (see
    // ovpf_core.reduce's sort key) -- not worth a hand-rolled uuid7 in the
    // browser just to match the producer convention other clients use.
    type, specVersion: "0.1", vehicle: `urn:ovpf:${vehicleId}`,
    occurredAt: now, recordedAt: now,
    producer, data,
  };
}

async function submitVehicleInfo(id) {
  const status = document.getElementById("edit-status");
  const facts = {
    vin: document.getElementById("edit-vin").value.trim(),
    make: document.getElementById("edit-make").value.trim(),
    model: document.getElementById("edit-model").value.trim(),
    modelYear: document.getElementById("edit-year").value.trim(),
  };
  if (!Object.values(facts).some(Boolean)) { status.textContent = t("enter_one_field"); return; }
  const vehicle = { type: "Vehicle" };
  for (const [k, val] of Object.entries(facts)) if (val) vehicle[k] = val;
  const userSession = getUserSession();
  const producer = userSession ? { type: "Owner", name: userSession.email } : { type: "Manual", name: "web" };
  const ev = envelope(id, "VehicleIdentified", { vehicle }, producer);
  await enqueueEvent(id, ev);
}

async function submitLogEvent(id, currentVehicle) {
  const status = document.getElementById("log-status");
  const type = document.getElementById("log-type").value;
  const desc = document.getElementById("log-desc").value.trim();
  const odoRaw = document.getElementById("log-odo").value.trim();
  if (!desc && type !== "OdometerReading") { status.textContent = t("describe_what_happened"); return; }
  if (type === "OdometerReading" && !odoRaw) { status.textContent = t("odometer_required"); return; }

  const odometer = odoRaw ? { value: Number(odoRaw), unit: "KMT" } : undefined;
  let data;
  if (type === "OdometerReading") data = { value: Number(odoRaw), unit: "KMT" };
  else if (type === "PartReplaced") data = { part: { type: "Product", name: desc }, odometer };
  else data = { serviceType: desc, odometer };

  // Attribution is automatic, never something typed in -- a signed-in
  // workshop/mechanic session already *is* proof of domain control (see
  // bestAuthSession/matchProducerSession server-side), so there's no
  // separate "logging as a verified workshop?" field to fill in. The
  // provider is still the only one who can turn this into
  // producer.verified; submitting verified:true here would be silently
  // stripped regardless (see docs/TRUST.md). A signed-in personal
  // identity (no workshop session) gets attributed by email instead of
  // the generic "web" -- not a *verified* producer, just a real name
  // instead of an anonymous one, same spirit as a git commit's author.
  const workshopSession = getWorkshopSession();
  const userSession = getUserSession();
  const producer = workshopSession
    ? { type: "Workshop", domain: workshopSession.domain }
    : userSession
      ? { type: "Owner", name: userSession.email }
      : { type: "Manual", name: "web" };
  const ev = envelope(id, type, data, producer);
  // Auth is resolved fresh at flush time (see bestAuthSession), not here
  // -- this event can be queued and shown immediately with no session at
  // all, same as any other local edit.
  await enqueueEvent(id, ev);
}

// --- Workshop registration + DNS verification ------------------------------

function renderWorkshopForm(app) {
  app.innerHTML = `
    <h1>${t("register_workshop_heading")}</h1>
    <p>${t("register_workshop_intro", { link: '<a href="https://github.com/tooming/openvehiclepassport/blob/main/docs/TRUST.md">docs/TRUST.md</a>' })}</p>
    <div class="row">
      <input id="ws-domain" placeholder="${esc(t("ws_domain_placeholder"))}">
      <input id="ws-name" placeholder="${esc(t("ws_name_placeholder"))}">
      <button id="ws-register-btn">${t("ws_register_btn")}</button>
    </div>
    <p id="ws-status" class="error"></p>
    <p>${t("ws_already_registered", { link: `<a href="#" id="ws-existing-link">${t("ws_existing_link")}</a>` })}</p>
  `;
  document.getElementById("ws-register-btn").onclick = async () => {
    const status = document.getElementById("ws-status");
    const domain = document.getElementById("ws-domain").value.trim().toLowerCase();
    if (!domain.includes(".")) { status.textContent = t("ws_domain_invalid"); return; }
    const name = document.getElementById("ws-name").value.trim();
    const r = await api("/v1/workshops", {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ domain, name }),
    });
    if (!r.ok) { status.textContent = t("error_prefix", { msg: r.body?.error || r.status }); return; }
    location.href = `/workshop/${encodeURIComponent(r.body.domain)}`;
  };
  enterSubmits(["ws-domain", "ws-name"], "ws-register-btn");
  document.getElementById("ws-existing-link").onclick = (e) => {
    e.preventDefault();
    const domain = prompt(t("ws_domain_prompt"));
    if (domain) location.href = `/workshop/${encodeURIComponent(domain.trim().toLowerCase())}`;
  };
}

async function renderWorkshopStatus(app, domain) {
  app.innerHTML = t("loading_ellipsis");
  const r = await api(`/v1/workshops/${encodeURIComponent(domain)}`);
  if (r.status === 404) {
    app.innerHTML = `<p class="error">${t("ws_no_such_workshop", { domain: esc(domain) })}</p>
      <p><a href="/workshop">${t("ws_register_it_link")}</a>.</p>`;
    return;
  }
  if (!r.ok) { app.innerHTML = `<p class="error">${t("ws_http_error", { status: r.status })}</p>`; return; }
  const w = r.body;

  // A cached role (from a previous /whoami) isn't trusted for the actual
  // gating below -- it's reconfirmed live every time this page loads,
  // since this is exactly the page that decides which controls (owner
  // admin vs. a mechanic's own attribution) get shown. A stale, expired,
  // or revoked session gets signed out here, with a reason, rather than
  // silently rendering a broken state.
  let session = getWorkshopSession();
  let who = null;
  let staleNote = "";
  if (session && session.domain === w.domain) {
    const whoR = await api(`/v1/workshops/${encodeURIComponent(domain)}/whoami`,
      { headers: { authorization: `Bearer ${session.token}` } });
    if (whoR.ok) {
      who = whoR.body;
      setWorkshopSession(w.domain, session.token, { role: who.role, mechanicId: who.mechanicId, email: who.email });
      session = getWorkshopSession();
    } else {
      clearWorkshopSession();
      session = null;
      staleNote = t("ws_stale_session_note");
    }
  }
  const isOwner = !!who && who.role === "workshop";
  const isMechanic = !!who && who.role === "mechanic";

  const verifiedBlock = w.verified
    ? `<p>${t("ws_verified_note", {
        badge: '<span class="badge-verified">✓ Verified</span>', time: fmtTime(w.verifiedAt),
        code: `<code>producer.domain: "${esc(w.domain)}"</code>`, code2: "<code>verified: true</code>" })}</p>`
    : `<p>${t("ws_unverified_note")}</p>
       <code class="dns">Type:  TXT
Name:  ${esc(w.dnsRecord.name)}
Value: ${esc(w.dnsRecord.value)}</code>
       <button id="ws-verify-btn">${t("ws_check_now_btn")}</button>
       <p id="ws-verify-status" class="error"></p>
       <p class="qr-caption">${t("ws_anyone_can_verify")}</p>`;

  // Owner vs. mechanic isn't announced in words here either -- the same
  // "verified representative" framing as the nav. Whether admin controls
  // (the Mechanics section below) actually show up is what distinguishes
  // the two roles in practice, not the wording of this sentence.
  let identityBlock;
  if (isOwner || isMechanic) {
    identityBlock = `<p>${t("ws_signed_in_as", {
      staleNote: esc(staleNote), strong: "<strong>", strongEnd: "</strong>",
      email: esc(who.email || ""), domain: esc(w.domain) })}
      <button id="ws-signout-btn">${t("ws_signout_btn")}</button></p>`;
  } else if (w.verified) {
    identityBlock = `<h2>${t("ws_signin_heading")}</h2>
      <p>${t("ws_signin_note", {
        staleNote: esc(staleNote), strong: "<strong>", strongEnd: "</strong>", domain: esc(w.domain) })}</p>
      <div class="row">
        <input id="otp-email" type="email" placeholder="${esc(t("otp_email_placeholder"))}" style="flex:1">
        <button id="otp-request-btn">${t("otp_send_code")}</button>
      </div>
      <div class="row" id="otp-code-row" style="display:none">
        <input id="otp-code" placeholder="${esc(t("otp_code_placeholder"))}" style="max-width:9rem">
        <button id="otp-verify-btn">${t("otp_verify")}</button>
      </div>
      <p id="otp-status" class="error"></p>`;
  } else {
    identityBlock = `<p class="qr-caption">${t("ws_verify_domain_first", { staleNote: esc(staleNote) })}</p>`;
  }

  const mechanicsBlock = isOwner ? `
    <h2>${t("ws_mechanics_heading")}</h2>
    <p>${t("ws_mechanics_note")}</p>
    <ul>${(w.mechanics || []).map(m =>
      `<li>${esc(m.email)} <button class="ws-remove-mech" data-id="${esc(m.mechanicId)}">${t("ws_mech_remove_btn")}</button></li>`
    ).join("") || `<li>${t("ws_mechanics_none")}</li>`}</ul>
    <div class="row">
      <input id="ws-mech-email" type="email" placeholder="${esc(t("ws_mech_email_placeholder"))}">
      <button id="ws-mech-add-btn">${t("ws_mech_add_btn")}</button>
    </div>
    <p id="ws-mech-status" class="error"></p>` : "";

  app.innerHTML = `
    <h1>${esc(w.name)}</h1>
    <div class="row no-print">
      <button id="ws-favorite-btn">${isFavorite(w.domain, "workshop") ? t("favorite_remove_btn") : t("favorite_add_btn")}</button>
      ${isOwner ? `<button id="ws-rename-toggle-btn">${t("ws_rename_btn")}</button>` : ""}
    </div>
    ${isOwner ? `
    <div class="no-print" id="ws-rename-box" style="display:none">
      <div class="row">
        <input id="ws-rename-input" value="${esc(w.name)}">
        <button id="ws-rename-save-btn">${t("save_btn")}</button>
      </div>
      <p id="ws-rename-status" class="error"></p>
    </div>` : ""}
    <div class="card">
      <div class="field">${t("ws_field_domain")}</div><div>${esc(w.domain)}</div>
      <div class="field">${t("ws_field_status")}</div><div>${w.verified ? t("ws_status_verified") : t("ws_status_pending")}</div>
    </div>
    ${verifiedBlock}
    ${identityBlock}
    ${mechanicsBlock}
    <p><a href="/workshop">${t("ws_register_another")}</a></p>
  `;

  document.getElementById("ws-favorite-btn").onclick = () => {
    const btn = document.getElementById("ws-favorite-btn");
    if (isFavorite(w.domain, "workshop")) { removeFavorite(w.domain, "workshop"); btn.textContent = t("favorite_add_btn"); }
    else { addFavorite(w.domain, w.name, "workshop"); btn.textContent = t("favorite_remove_btn"); }
  };

  const renameToggleBtn = document.getElementById("ws-rename-toggle-btn");
  if (renameToggleBtn) renameToggleBtn.onclick = () => {
    const box = document.getElementById("ws-rename-box");
    box.style.display = box.style.display === "none" ? "block" : "none";
  };
  const renameSaveBtn = document.getElementById("ws-rename-save-btn");
  if (renameSaveBtn) renameSaveBtn.onclick = async () => {
    const status = document.getElementById("ws-rename-status");
    const name = document.getElementById("ws-rename-input").value.trim();
    if (!name) { status.textContent = t("enter_one_field"); return; }
    renameSaveBtn.disabled = true;
    const rr = await api(`/v1/workshops/${encodeURIComponent(domain)}/name`, {
      method: "POST",
      headers: { "content-type": "application/json", authorization: `Bearer ${session.token}` },
      body: JSON.stringify({ name }),
    });
    renameSaveBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    renderWorkshopStatus(app, domain);
  };
  enterSubmits(["ws-rename-input"], "ws-rename-save-btn");

  const verifyBtn = document.getElementById("ws-verify-btn");
  if (verifyBtn) verifyBtn.onclick = async () => {
    const status = document.getElementById("ws-verify-status");
    verifyBtn.disabled = true;
    status.textContent = t("ws_checking_dns");
    const vr = await api(`/v1/workshops/${encodeURIComponent(domain)}/verify`, { method: "POST" });
    if (!vr.ok) { status.textContent = t("error_prefix", { msg: vr.body?.error || vr.status }); verifyBtn.disabled = false; return; }
    if (vr.body.verified) { renderWorkshopStatus(app, domain); return; }
    status.textContent = vr.body.checkError
      ? t("ws_dns_check_failed", { msg: vr.body.checkError })
      : t("ws_not_found_yet", { found: JSON.stringify(vr.body.found || []) });
    verifyBtn.disabled = false;
  };

  const otpRequestBtn = document.getElementById("otp-request-btn");
  if (otpRequestBtn) otpRequestBtn.onclick = async () => {
    const status = document.getElementById("otp-status");
    const email = document.getElementById("otp-email").value.trim();
    if (!email) { status.textContent = t("ws_enter_email"); return; }
    otpRequestBtn.disabled = true;
    const rr = await api(`/v1/workshops/${encodeURIComponent(domain)}/otp/request`, {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email }),
    });
    otpRequestBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    status.textContent = rr.body.note || t("otp_check_email");
    document.getElementById("otp-code-row").style.display = "flex";
  };
  const otpVerifyBtn = document.getElementById("otp-verify-btn");
  if (otpVerifyBtn) otpVerifyBtn.onclick = async () => {
    const status = document.getElementById("otp-status");
    const email = document.getElementById("otp-email").value.trim();
    const code = document.getElementById("otp-code").value.trim();
    if (!code) { status.textContent = t("otp_enter_code"); return; }
    otpVerifyBtn.disabled = true;
    const rr = await api(`/v1/workshops/${encodeURIComponent(domain)}/otp/verify`, {
      method: "POST", headers: { "content-type": "application/json" },
      body: JSON.stringify({ email, code }),
    });
    otpVerifyBtn.disabled = false;
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    setWorkshopSession(w.domain, rr.body.token,
      { role: rr.body.role, mechanicId: rr.body.mechanicId, email });
    renderAuthStatus();
    renderWorkshopStatus(app, domain);
  };
  enterSubmits(["otp-email"], "otp-request-btn");
  enterSubmits(["otp-code"], "otp-verify-btn");

  const signoutBtn = document.getElementById("ws-signout-btn");
  if (signoutBtn) signoutBtn.onclick = () => {
    clearWorkshopSession();
    renderAuthStatus();
    renderWorkshopStatus(app, domain);
  };

  const addBtn = document.getElementById("ws-mech-add-btn");
  if (addBtn) addBtn.onclick = async () => {
    const status = document.getElementById("ws-mech-status");
    const email = document.getElementById("ws-mech-email").value.trim();
    if (!email) { status.textContent = t("ws_enter_domain_email"); return; }
    const rr = await api(`/v1/workshops/${encodeURIComponent(domain)}/mechanics`, {
      method: "POST",
      headers: { "content-type": "application/json", authorization: `Bearer ${session.token}` },
      body: JSON.stringify({ email }),
    });
    if (!rr.ok) { status.textContent = t("error_prefix", { msg: rr.body?.error || rr.status }); return; }
    renderWorkshopStatus(app, domain);
  };
  enterSubmits(["ws-mech-email"], "ws-mech-add-btn");

  document.querySelectorAll(".ws-remove-mech").forEach(btn => {
    btn.onclick = async () => {
      const rr = await api(`/v1/workshops/${encodeURIComponent(domain)}/mechanics/${encodeURIComponent(btn.dataset.id)}`, {
        method: "DELETE", headers: { authorization: `Bearer ${session.token}` },
      });
      if (!rr.ok) { alert(t("error_prefix", { msg: rr.body?.error || rr.status })); return; }
      renderWorkshopStatus(app, domain);
    };
  });
}

async function main() {
  renderAuthStatus();
  const app = document.getElementById("app");
  let m;
  if ((m = location.pathname.match(/^\/p\/([0-9a-fA-F-]{36})/))) {
    return renderPassport(app, m[1]);
  }
  if (location.pathname === "/workshop") {
    return renderWorkshopForm(app);
  }
  if ((m = location.pathname.match(/^\/workshop\/([^/]+)$/))) {
    return renderWorkshopStatus(app, decodeURIComponent(m[1]));
  }
  return renderHome(app);
}
initNavSignin();
initLangSelect();
applyStaticTranslations();
main();
</script>
